name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Recreate iOS platform
        run: |
          flutter create --platforms ios . --project-name calculator
          flutter pub get

      - name: Build iOS with xcodebuild (no codesign)
        run: |
          # 先用 flutter assemble 生成 Xcode 所需的 Dart 产物
          flutter assemble \
            --define=BuildMode=release \
            --output build/ios_framework \
            ios_framework_debug

          # 用 xcodebuild 直接构建，绕过 flutter build ios 的自动升级
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios_derived \
            -archivePath build/ios_archive/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          # 从 archive 中提取 .app
          APP_PATH="build/ios_archive/Runner.xcarchive/Products/Applications/Runner.app"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r build/calculator.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-ipa
          path: build/calculator.ipa
